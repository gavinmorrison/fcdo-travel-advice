name: Update FCDO Travel Advice README

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: '0 5 * * *' # Run daily at 5 AM UTC

permissions:
  contents: write # Allow workflow to commit to the repo

jobs:
  update_readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Using Python 3.11

      - name: Install dependencies
        run: pip install requests

      - name: Run script and generate results
        run: python get_status.py > results.md

      - name: Check if results file is empty
        id: check_results
        run: |
          if [ -s results.md ]; then
            echo "Results generated successfully."
            echo "empty=false" >> $GITHUB_OUTPUT
          else
            # Output error message to Actions log
            echo "::error::results.md is empty. The Python script might have failed to fetch or process data."
            echo "empty=true" >> $GITHUB_OUTPUT
            # Exit with failure code to stop the workflow here
            exit 1
          fi

      - name: Update README.md
        # Only run this step if the results file was not empty
        if: steps.check_results.outputs.empty == 'false'
        run: |
          # Ensure README.md exists and has markers (add if missing)
          # This handles the very first run or if the file/markers get deleted
          if [ ! -f README.md ]; then
            echo "# FCDO Travel Advice Status" > README.md
            echo "" >> README.md
            echo "<!-- FCDO_TABLE_START -->" >> README.md
            echo "<!-- FCDO_TABLE_END -->" >> README.md
            echo "" >> README.md
            echo "Table auto-updated daily by GitHub Actions." >> README.md
            echo "README.md created with markers."
          else
            # Check and append markers if they are missing from an existing file
            grep -qxF '<!-- FCDO_TABLE_START -->' README.md || echo -e "\n<!-- FCDO_TABLE_START -->" >> README.md
            grep -qxF '<!-- FCDO_TABLE_END -->' README.md || echo -e "\n<!-- FCDO_TABLE_END -->" >> README.md
          fi

          # Use awk to replace content between markers with the content of results.md
          # Reads results.md into 'table' var, then prints lines outside markers,
          # prints start marker, prints table content, skips lines until end marker.
          awk '
            BEGIN { while ((getline line < "results.md") > 0) table = table line "\n"; close("results.md") }
            /<!-- FCDO_TABLE_START -->/ { print; print table; skip = 1 }
            /<!-- FCDO_TABLE_END -->/ { skip = 0 }
            !skip { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md
          echo "README.md updated with new table content."

      - name: Commit and push changes
        # Only run this step if the results file was not empty
        if: steps.check_results.outputs.empty == 'false'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # Check if there are changes staged for commit
          if git diff --staged --quiet; then
            echo "No changes detected in README.md."
          else
            git commit -m "Update FCDO travel advice table"
            # Add retry logic for push in case of transient network issues
            git push || (sleep 5 && git push) || (sleep 10 && git push)
            echo "Changes committed and pushed to repository."
          fi