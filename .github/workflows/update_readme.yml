name: Update FCDO Travel Advice README

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: '0 2 * * *' # Run daily at 2 AM UTC

permissions:
  contents: write # Allow workflow to commit to the repo

jobs:
  update_readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Using Python 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script and generate results.md
        run: |
          echo "Running FCDO travel advice script..."
          python get_status.py --output results.md 2> script_stderr.log || true
          echo "Script execution completed."

      - name: Check script stderr for errors
        run: |
          if [ -s script_stderr.log ]; then
            echo "::warning::Script produced errors:"
            cat script_stderr.log
          fi

      - name: Check if results file exists and is not empty
        id: check_results
        run: |
          if [ -s results.md ]; then
            echo "Results generated successfully."
            echo "empty=false" >> $GITHUB_OUTPUT
          else
            echo "::error::results.md is empty or was not created. The Python script likely failed."
            echo "::warning::Script stderr log:"
            cat script_stderr.log # Print stderr log for debugging
            echo "empty=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Save old table for comparison
        if: steps.check_results.outputs.empty == 'false'
        run: |
          # Extract old table for change detection
          if [ -f README.md ]; then
            awk '/<!-- FCDO_TABLE_START -->/{flag=1; next} /<!-- FCDO_TABLE_END -->/{flag=0} flag' README.md > old_table.md
          else
            touch old_table.md
          fi

      - name: Update README.md
        # Only run this step if the results file exists and is not empty
        if: steps.check_results.outputs.empty == 'false'
        run: |
          # Ensure README.md exists and has markers (add if missing)
          # This handles the very first run or if the file/markers get deleted
          if [ ! -f README.md ]; then
            echo "# FCDO Travel Advice Status" > README.md
            echo "" >> README.md
            echo "<!-- FCDO_TABLE_START -->" >> README.md
            echo "<!-- FCDO_TABLE_END -->" >> README.md
            echo "" >> README.md
            echo "Table auto-updated daily by GitHub Actions." >> README.md
            echo "README.md created with markers."
          else
            # Check and append markers if they are missing from an existing file
            grep -qxF '<!-- FCDO_TABLE_START -->' README.md || echo -e "\n<!-- FCDO_TABLE_START -->" >> README.md
            grep -qxF '<!-- FCDO_TABLE_END -->' README.md || echo -e "\n<!-- FCDO_TABLE_END -->" >> README.md
          fi

          # Use awk to replace content between markers with the content of results.md
          # Reads results.md into 'table' var, then prints lines outside markers,
          # prints start marker, prints table content, skips lines until end marker.
          awk '
            BEGIN { while ((getline line < "results.md") > 0) table = table line "\n"; close("results.md") }
            /<!-- FCDO_TABLE_START -->/ { print; print table; skip = 1 }
            /<!-- FCDO_TABLE_END -->/ { skip = 0 }
            !skip { print }
          ' README.md > README.md.tmp && mv README.md.tmp README.md
          echo "README.md updated with new table content."

      - name: Update last updated date
        if: steps.check_results.outputs.empty == 'false'
        run: |
          # Update the "Last updated" line with actual date/time
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s/^\*Last updated:.*\*$/*Last updated: ${DATE}*/" README.md
          echo "Updated timestamp to: ${DATE}"

      - name: Detect changes and generate summary
        id: detect_changes
        if: steps.check_results.outputs.empty == 'false'
        run: |
          # Python script to compare old and new tables, generate change summary
          python3 << 'PYTHON_SCRIPT'
          import re
          import os
          from datetime import datetime, timezone

          def parse_table(content):
              """Parse markdown table and extract country -> status mapping."""
              countries = {}
              # Match table rows: | <anything> | [Country](url) | advice |
              # Capture everything between the first pair of pipes as the emoji
              for match in re.finditer(r'\|\s*(.+?)\s*\|\s*\[([^\]]+)\]', content):
                  emoji, country = match.groups()
                  emoji = emoji.strip()
                  if emoji in KNOWN_EMOJI:
                      countries[country] = emoji
              return countries

          KNOWN_EMOJI = {'🔴', '⚠️', '🟡', '🟢', '❓'}

          EMOJI_PRIORITY = {'🔴': 4, '⚠️': 3, '🟡': 2, '🟢': 1, '❓': 0}

          # Read old and new tables
          old_content = open('old_table.md').read() if os.path.exists('old_table.md') else ''
          new_content = open('results.md').read() if os.path.exists('results.md') else ''

          old_countries = parse_table(old_content)
          new_countries = parse_table(new_content)

          # Detect status changes (only countries present in both runs)
          changes = []
          for country in sorted(set(old_countries) & set(new_countries)):
              old_status = old_countries[country]
              new_status = new_countries[country]
              if old_status != new_status:
                  changes.append((country, old_status, new_status))

          if not changes:
              commit_msg = "Update FCDO travel advice table"
              changelog_entry = ""
          else:
              worsened = sum(1 for _, o, n in changes if EMOJI_PRIORITY.get(n, 0) > EMOJI_PRIORITY.get(o, 0))
              improved = len(changes) - worsened

              parts = []
              if worsened:
                  parts.append(f"{worsened} worsened")
              if improved:
                  parts.append(f"{improved} improved")
              commit_msg = f"Update FCDO travel advice: {', '.join(parts)}"

              timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
              details = [f"  {country}: {old} → {new}" for country, old, new in changes]
              changelog_entry = f"\n## {timestamp}\n\n" + "\n".join(details) + "\n"

          with open('commit_message.txt', 'w') as f:
              f.write(commit_msg)

          with open('changelog_entry.txt', 'w') as f:
              f.write(changelog_entry)

          print(f"has_changes={'true' if changes else 'false'}")
          print(f"commit_message={commit_msg}")

          PYTHON_SCRIPT

          # Set outputs
          echo "commit_message=$(cat commit_message.txt)" >> $GITHUB_OUTPUT
          if [ -s changelog_entry.txt ]; then
            echo "has_status_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_status_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Update CHANGES.log
        if: steps.check_results.outputs.empty == 'false' && steps.detect_changes.outputs.has_status_changes == 'true'
        run: |
          # Prepend new changes to CHANGES.log (most recent first)
          if [ -f CHANGES.log ]; then
            cat changelog_entry.txt CHANGES.log > CHANGES.log.tmp
            mv CHANGES.log.tmp CHANGES.log
          else
            echo "# FCDO Travel Advice Status Changes" > CHANGES.log
            echo "" >> CHANGES.log
            echo "This log tracks changes in travel advice status for countries." >> CHANGES.log
            cat changelog_entry.txt >> CHANGES.log
          fi
          echo "Updated CHANGES.log with new entries"

      - name: Commit and push changes
        # Only run this step if the results file was not empty
        if: steps.check_results.outputs.empty == 'false'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # Add country pages if they were generated
          if [ -d countries ]; then
            git add countries/
          fi
          # Also add CHANGES.log if it exists
          if [ -f CHANGES.log ]; then
            git add CHANGES.log
          fi
          # Check if there are changes staged for commit
          if git diff --staged --quiet; then
            echo "No changes detected in README.md."
          else
            git commit -m "${{ steps.detect_changes.outputs.commit_message }}"
            # Add retry logic for push in case of transient network issues
            git push || (sleep 5 && git push) || (sleep 10 && git push)
            echo "Changes committed and pushed to repository."
          fi